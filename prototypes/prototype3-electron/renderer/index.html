<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Content Security Policy:
    - default-src 'self'      → local files only by default
    - style-src  'self' 'unsafe-inline' → allow inline styles (Electron limitation)
    - img-src    'self' data: file: → local images + data URIs
    - script-src 'self'       → only local scripts (app.js via preload)
    External content is loaded in the sandboxed WebContentsView, NOT here.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data: file:;
                 script-src 'self';" />
  <title>Gertrude Shell</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Shell Wrapper ─────────────────────────────────────────────────────── -->
<div id="shell">

  <!-- ── Persistent Header Bar ─────────────────────────────────────────── -->
  <header id="header">
    <span id="header-title">🌸 Gertrude's Computer</span>
    <span id="header-context">Loading…</span>
    <button id="end-btn" class="hidden" title="Go back to Home" aria-label="END — Return to Home">END</button>
  </header>

  <!-- ── Content Area ───────────────────────────────────────────────────── -->
  <main id="content">

    <!-- Main Board (always in DOM; hidden when a site is open) -->
    <section id="main-board" aria-label="Home Board">

      <!-- Photos of Gertrude & Marty -->
      <div id="photos-row">

        <div class="photo-frame" id="frame-gertrude">
          <!-- Filled by app.js; falls back to emoji placeholder -->
          <div class="photo-placeholder" id="photo-gertrude" role="img" aria-label="Photo of Gertrude">
            👩
          </div>
          <span class="photo-caption">Gertrude</span>
        </div>

        <div class="photo-frame" id="frame-marty">
          <div class="photo-placeholder" id="photo-marty" role="img" aria-label="Photo of Marty">
            👨
          </div>
          <span class="photo-caption">Marty</span>
        </div>

      </div><!-- /photos-row -->

      <!-- Live clock -->
      <div id="clock" aria-live="polite" aria-atomic="true">12:00 PM</div>

      <!-- App Buttons -->
      <nav id="apps-grid" aria-label="Applications">

        <button class="app-btn facebook" data-app="facebook"
                aria-label="Open Facebook">
          <span class="app-btn-icon">👤</span>
          <span class="app-btn-label">Facebook</span>
        </button>

        <button class="app-btn milo" data-app="milo"
                aria-label="Open Milo — Google Photos">
          <span class="app-btn-icon">📸</span>
          <span class="app-btn-label">Milo&#10;(Photos)</span>
        </button>

        <button class="app-btn aolnews" data-app="aolnews"
                aria-label="Open AOL News">
          <span class="app-btn-icon">📰</span>
          <span class="app-btn-label">AOL News</span>
        </button>

        <button class="app-btn aolmail" data-app="aolmail"
                aria-label="Open AOL Mail">
          <span class="app-btn-icon">✉️</span>
          <span class="app-btn-label">AOL Mail</span>
        </button>

        <button class="app-btn desktop" data-app="desktop"
                aria-label="Show Windows Desktop">
          <span class="app-btn-icon">🖥️</span>
          <span class="app-btn-label">Desktop</span>
        </button>

      </nav><!-- /apps-grid -->

    </section><!-- /main-board -->

  </main><!-- /content -->

</div><!-- /shell -->

<!-- ── Blocked URL Warning Overlay ───────────────────────────────────────── -->
<div id="blocked-overlay" class="hidden" role="alertdialog"
     aria-modal="true" aria-labelledby="blocked-title" aria-describedby="blocked-msg">
  <div id="blocked-dialog">
    <h2 id="blocked-title">⛔ Page Blocked</h2>
    <p id="blocked-msg">
      That website is not available here.<br/>
      Please ask for help if you need it.
    </p>
    <button id="blocked-ok-btn" autofocus>OK</button>
  </div>
</div>

<!-- ── First-Run Setup Modal ─────────────────────────────────────────────── -->
<div id="setup-overlay" class="hidden" role="dialog"
     aria-modal="true" aria-labelledby="setup-title">
  <div id="setup-dialog">
    <h2 id="setup-title">Welcome to Gertrude's Computer! 🌸</h2>
    <p class="setup-subtitle">Let's set up your accounts. You only need to do this once.</p>

    <div class="setup-section">
      <h3>Facebook</h3>
      <div class="field-row">
        <label for="fb-user">Email address</label>
        <input type="email" id="fb-user" placeholder="you@example.com" autocomplete="username" />
      </div>
      <div class="field-row">
        <label for="fb-pass">Password</label>
        <input type="password" id="fb-pass" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <div class="setup-section">
      <h3>AOL Mail</h3>
      <div class="field-row">
        <label for="aol-user">Email address</label>
        <input type="email" id="aol-user" placeholder="you@aol.com" autocomplete="username" />
      </div>
      <div class="field-row">
        <label for="aol-pass">Password</label>
        <input type="password" id="aol-pass" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <button id="setup-save-btn">Save &amp; Start Using My Computer ✓</button>
  </div>
</div>

<!-- Renderer script loaded after DOM is ready -->
<script src="app.js"></script>
</body>
</html>
